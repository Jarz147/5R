<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Dashboard 5R</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-100 min-h-screen font-sans flex items-center justify-center px-4">
    <main class="w-full max-w-md">
        <div class="bg-white rounded-3xl shadow-xl border border-slate-200 p-8 space-y-6">
            <div class="text-center space-y-1">
                <p class="text-xs font-black text-indigo-500 tracking-[0.3em] uppercase">Maintenance &amp; PE</p>
                <h1 class="text-2xl font-black text-slate-800 tracking-tight">Login Dashboard 5R</h1>
                <p class="text-xs text-slate-500 font-bold uppercase italic">Masuk untuk mengakses monitoring</p>
            </div>
            <form id="loginForm" class="space-y-4">
                <div>
                    <label for="loginUser" class="block text-xs font-black text-slate-500 uppercase mb-1.5">Username</label>
                    <input id="loginUser" type="text" autocomplete="username" required
                        class="w-full px-3 py-2.5 rounded-xl border border-slate-200 text-sm font-bold text-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                        placeholder="mis. admin5r">
                </div>
                <div>
                    <label for="loginPass" class="block text-xs font-black text-slate-500 uppercase mb-1.5">Password</label>
                    <input id="loginPass" type="password" autocomplete="current-password" required
                        class="w-full px-3 py-2.5 rounded-xl border border-slate-200 text-sm font-bold text-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                        placeholder="********">
                </div>
                <p class="text-[11px] text-slate-400 font-bold italic">
                    Hint: username <span class="font-black text-slate-600">admin5r</span> &amp; password <span class="font-black text-slate-600">5r@2024</span> (bisa diubah di kode).
                </p>
                <button type="submit"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-2.5 rounded-xl font-black text-xs uppercase tracking-wide shadow-md active:scale-95 transition-all">
                    Masuk
                </button>
            </form>
        </div>
    </main>

    <script>
        const AUTH_STORAGE_KEY = 'piket_auth';
        const USERS_STORAGE_KEY = 'piket_users';
        const ADMIN_USERNAME = 'admin5r';
        const ADMIN_PASSWORD = '5r@2024';

        function getStoredUsers() {
            try {
                var raw = localStorage.getItem(USERS_STORAGE_KEY);
                if (!raw) return [];
                var parsed = JSON.parse(raw);
                return Array.isArray(parsed) ? parsed : [];
            } catch (_) {
                return [];
            }
        }

        function saveAuthState(loggedIn, username) {
            try {
                localStorage.setItem(AUTH_STORAGE_KEY, JSON.stringify({ loggedIn: !!loggedIn, username: username || null }));
            } catch (_) {}
        }

        function isLoggedIn() {
            try {
                var raw = localStorage.getItem(AUTH_STORAGE_KEY);
                if (!raw) return false;
                var parsed = JSON.parse(raw);
                return !!parsed && !!parsed.loggedIn;
            } catch (_) {
                return false;
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            if (isLoggedIn()) {
                window.location.href = 'index.html';
                return;
            }

            var form = document.getElementById('loginForm');
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                var username = (document.getElementById('loginUser').value || '').trim();
                var password = document.getElementById('loginPass').value || '';

                if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
                    saveAuthState(true, username);
                    window.location.href = 'index.html';
                    return;
                }

                var users = getStoredUsers();
                var found = users.find(function(u) {
                    return (u.username || '').toLowerCase() === username.toLowerCase() && u.password === password;
                });
                if (found) {
                    saveAuthState(true, found.username);
                    window.location.href = 'index.html';
                } else {
                    alert('Username atau password salah.');
                }
            });
        });
    </script>
</body>
</html>
