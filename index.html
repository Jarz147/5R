<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Piket | Monitoring Real-time</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <div>
                <h1 class="text-2xl font-extrabold tracking-tight text-slate-800 uppercase">Monitoring Piket Harian</h1>
                <p id="currentDate" class="text-slate-500 font-medium"></p>
            </div>
            <div class="flex gap-3 mt-4 md:mt-0">
                <button onclick="exportCSV()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg font-bold text-sm shadow-sm transition">
                    LAPORAN BULANAN
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="stat-card">
                <div class="stat-label">Progress Hari Ini</div>
                <div class="stat-value text-blue-600" id="overallProgress">0/10</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Status Database</div>
                <div class="stat-value text-green-500" id="dbStatus">ONLINE</div>
            </div>
            <div class="stat-card text-center md:text-left">
                <div class="stat-label">Total Area</div>
                <div class="stat-value text-slate-700">10 Lokasi</div>
            </div>
        </div>

        <div id="picketGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4">
            </div>

        <div class="mt-10 bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                <h2 class="text-lg font-bold text-slate-800">Riwayat Aktivitas Bulanan</h2>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50">
                        <tr>
                            <th class="p-4 text-xs font-bold text-slate-500 uppercase">Waktu/Tanggal</th>
                            <th class="p-4 text-xs font-bold text-slate-500 uppercase">Area Lokasi</th>
                            <th class="p-4 text-xs font-bold text-slate-500 uppercase">Petugas</th>
                            <th class="p-4 text-xs font-bold text-slate-500 uppercase">Status</th>
                        </tr>
                    </thead>
                    <tbody id="activityTable" class="text-sm text-slate-600 divide-y divide-slate-100">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
